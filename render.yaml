services:
  - type: web
    name: anka-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANKA_SECRET_KEY
        generateValue: true
      - key: ANKA_HTTPS_ONLY
        value: "1"
