services:
  - type: web
    name: anka
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANKA_SECRET_KEY
        generateValue: true
      - key: ANKA_HTTPS_ONLY
        value: "1"
      - key: ANKA_DB_PATH
        value: /var/data/anka.db
      - key: ANKA_BACKUP_DIR
        value: /var/data/backups
    disk:
      name: anka-data
      mountPath: /var/data
      sizeGB: 5
